<template data-sly-template.item="${@ logo,href,cssclass}">
    <div class="image ${cssclass} cmp-image--small" id="header-logo">
        <div
                data-asset-id="45c6ee92-90e1-4af2-af69-b6dcbc7daeb7"
                id="image-72c95dc7ac"
                class="cmp-image"
                itemscope=""
                itemtype="http://schema.org/ImageObject"
        >
            <a data-sly-test="${logo}"
                    class="cmp-image__link"
                    href=${href}
                    target="#"

            >
                <img
                        src=${logo}
                        loading="lazy"
                        class="cmp-image__image"
                        itemprop="contentUrl"
                        alt=" "
                        title="Logo"
                />
            </a>
        </div>
    </div>

</template>
