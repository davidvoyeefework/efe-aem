<div data-sly-use.FeHeader="com.efe.core.models.FeHeader"
     data-sly-use.logoTemplate="logo-template.html"
     data-sly-use.template="core/wcm/components/commons/v1/templates.html"
     data-sly-test.isNotEmpty="${FeHeader.primaryLogo}"
     class="${FeHeader.type} minimal-header">
    <header class="header" data-component="header" id="${FeHeader.id}">
        <div class="container responsivegrid" id="efe-global-nav-header">
            <div id="container-99d779a4e6" class="cmp-container">
                <div class="container responsivegrid">
                    <div id="container-99d779a4e6"
                         class="cmp-container cmp-container--unset cmp-container--1920  cmp-container--width-1920 efe-nav-header">
                        <sly data-sly-test="${FeHeader.sponsorDetails}">
                            <div class="cmp-text">
                                ${FeHeader.sponsorDetails @ context = 'html'}
                            </div>
                        </sly>
                    </div>
                </div>
            </div>
        </div>
        <div class="container responsivegrid" id="header-logo">
            <div id="container-99d779a4e6" class="cmp-container cmp-container--white">
                <div class="container responsivegrid" id="efe-nav-main">
                    <div id="container-99d779a4e6"
                         class="cmp-container--white cmp-container--unset cmp-container--1920 cmp-container--width-1920 cmp-container--26">
                        <sly data-sly-test="${FeHeader.primaryLogo}" data-sly-call="${logoTemplate.item @ logo=FeHeader.primaryLogo,alt=FeHeader.primaryLogoAltText,cssclass='cmp-image--efe-logo-primary cmp-image--small',id='primary-logo'}"></sly>
                        <div data-sly-test="${FeHeader.primaryLogo || FeHeader.secondaryLogo}" class="minimal-header__vertical-line"></div>
                        <sly data-sly-call="${logoTemplate.item @ logo=FeHeader.secondaryLogo,alt=FeHeader.secondaryLogoAltText,cssclass='cmp-image--efe-logo-secondary sponsor-logo cmp-image--small',id='secondary-logo'}"></sly>
                        <div class="container responsivegrid" id="nav-list-cta-group" style="display: none">
                            <sly data-sly-test="${FeHeader.sponsorDetails}">
                                <div class="cmp-text">
                                    ${FeHeader.sponsorDetails @ context = 'html'}
                                </div>
                            </sly>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>
</div>
<sly data-sly-call="${template.placeholder @ isEmpty=!isNotEmpty, classAppend='enroll-form'}"></sly>
