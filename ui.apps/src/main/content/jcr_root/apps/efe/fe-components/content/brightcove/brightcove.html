<div data-sly-use.template="core/wcm/components/commons/v1/templates.html"
   data-sly-use.model="com.efe.core.models.BrightCove"
   data-sly-test.isVideoConfigured="${model.videoUrl}">

      <iframe src="${model.videoUrl}" allowfullscreen="" allow="encrypted-media" width="100%" height="100%"></iframe>

</div>
<sly data-sly-call="${template.placeholder @ isEmpty=!isVideoConfigured}"></sly>
