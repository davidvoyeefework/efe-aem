<footer data-sly-use.model="com.efe.core.models.FeFooter"
        data-sly-use.template="core/wcm/components/commons/v1/templates.html"
        id="efe-footer" class="footer footer--mobile">
    <div id="${model.id}" class="container responsivegrid">
        <div id="container-99d779a4e6" class="cmp-container cmp-container--bg-efe-gray-light">
            <div class="container responsivegrid">
                <div id="container-99d779a4e6" class="cmp-container cmp-container--bg-efe-gray-light cmp-container--1920 cmp-container--width-1920  cmp-container--unset">
               <span id="logo-social-container" data-sly-test="${model.fileReference}">
                  <div class="image cmp-image--efe-logo-secondary cmp-image--small" id="efe-logo">
                     <div class="cmp-image" itemscope="" itemtype="http://schema.org/ImageObject">
                        <img src="${model.fileReference}" loading="lazy" class="cmp-image__image" itemprop="contentUrl" alt="${model.altText}" title="${model.altText}"/>
                        <meta itemprop="caption" content="${model.altText}" />
                     </div>
                  </div>
               </span>
                    <div class="separator cmp-separator--primary cmp-separator--efe-gray-blue" id="efe-hr">
                        <div id="separator-6e548b2b7e">
                            <hr class="cmp-separator__horizontal-rule">
                        </div>
                    </div>
                    <div class="list cmp-list--footer unbounce-footer-links">
                        <ul class="cmp-list">
                        </ul>
                    </div>
                    <div id="disclosure-copy">

                    </div>
                </div>
            </div>
        </div>
    </div>
</footer>
