<div data-sly-use.template="core/wcm/components/commons/v1/templates.html"
   data-sly-use.model="com.efe.core.models.ColumnControl" data-sly-test.isConfigured="${model.gridClass}">
   <div id="${model.id}" class="aem-Grid aem-Grid--12">
      <div class="aem-Grid aem-Grid--12">
         <div data-sly-repeat="${model.columnsIndex}"
            class="container responsivegrid aem-GridColumn--default--none aem-GridColumn ${model.gridClass}">
            <div data-sly-resource="${item @ resourceType='efe/components/container',decoration=true}">
            </div>
         </div>

      </div>
   </div>
</div>
<sly data-sly-call="${template.placeholder @ isEmpty=!isConfigured}"></sly>
