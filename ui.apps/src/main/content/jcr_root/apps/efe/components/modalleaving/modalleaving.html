<sly data-sly-use.model="com.efe.core.models.ModalLeaving"/>
<div class="dialog-container cmp-modal--leaving" id="${model.id}" aria-hidden="true" aria-labelledby="my-dialog-title"
     aria-describedby="my-dialog-description" data-component="modal-leaving" data-sly-attribute.modal-list="${model.modalList}">
    <div class="dialog-overlay" data-a11y-dialog-hide></div>
    <div class="cmp-modal" role="document">
        <div class="cmp-modal__container responsivegrid">
            <button data-a11y-dialog-hide class="cmp-modal__close" aria-label="Close this dialog window">
                <svg width="19" height="19" viewBox="0 0 19 19" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <line y1="-1" x2="23.9943" y2="-1" transform="matrix(0.705714 0.708497 -0.705714 0.708497 0 2)" stroke="#7A7D82"
                          stroke-width="2" />
                    <line y1="-1" x2="23.9943" y2="-1" transform="matrix(0.705714 -0.708497 0.705714 0.708497 2.06641 19)"
                          stroke="#7A7D82" stroke-width="2" />
                </svg>
            </button>
            <div class="cmp-modal__logo">
                <img src="${model.logo}" alt="${model.logoAltText}">
            </div>
            <h1 class="cmp-modal__title">${model.modalTitle}</h1>
            <div class="cmp-modal__text">
                <p>
                    ${model.modalDescriptionText @context ='html'}
                </p>
            </div>
        </div>
        <div class="cmp-modal__action-container">
            <button type="button" id="button-5487aab983" class="cmp-modal__button-primary">
                <span class="cmp-modal__button-primary-text">${model.modalLeaveText}</span>
            </button>
            <button type="button" id="button-5487aab984" class="cmp-modal__button-secondary">
                <span class="cmp-modal__button-secondary-text">${model.modalCancelText}</span>
            </button>
        </div>
    </div>
</div>
