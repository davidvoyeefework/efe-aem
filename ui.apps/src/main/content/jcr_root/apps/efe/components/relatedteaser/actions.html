<sly data-sly-template.actions="${@ teaser}">
    <div class="cmp-teaser__action-container">
        <a class="cmp-teaser__action-link" data-sly-attribute="${teaser.link.htmlAttributes}"
           data-sly-unwrap="${!teaser.link.valid || !teaser.actions.empty}"
           data-cmp-clickable="${teaser.data ? true : false}">${properties.linkText}</a>
    </div>
</sly>
