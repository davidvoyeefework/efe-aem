<div data-sly-test = "${wcmmode.edit}">ECScheduler Component</div>
<sly data-sly-use.ecschedule="com.efe.core.models.ECScheduler"
     data-sly-use.templates="core/wcm/components/commons/v1/templates.html">
    <script src="${ecschedule.ECEmbedURL}"></script>
    <div class="efe-ec-scheduler" data-container-id="${ecschedule.containerID @ context='attribute'}">
        <div id="${ecschedule.containerID @ context='attribute'}"></div>
    </div>
    <script>
        //Inject scheduler
        window.efeSelfSchedulerEc.inject({ id: "${ecschedule.containerID @ context='attribute'}" });

        // Dynamic reset event from dialog
        const resetEvent = "${ecschedule.resetEC @ context='scriptString'}";

        function reinjectEcScheduler() {
            const containerId = "${ecschedule.containerID @ context='attribute'}";
            const host = document.getElementById(containerId);

            if (!host) {
            console.warn("[ECScheduler] container not found:", containerId);
            return;
            }

            host.innerHTML = "";

            window.efeSelfSchedulerEc.inject({ id: containerId });
        }

        if (resetEvent) {
            document.addEventListener(resetEvent, function() {
                console.log("Reset event triggered:", resetEvent);

                // Re-inject the scheduler 
                reinjectEcScheduler();
            } , {once: false});
        }
    </script>
</sly>
