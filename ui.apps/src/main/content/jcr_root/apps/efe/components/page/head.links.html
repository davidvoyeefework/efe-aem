<sly data-sly-use.efe="com.efe.core.models.PageModel"/>
<link data-sly-use.page="com.adobe.cq.wcm.core.components.models.Page"
      data-sly-test="${efe.canonicalLink}"
      rel="canonical" href="${efe.canonicalLink}">
<link data-sly-test="${page.alternateLanguageLinks}"
      data-sly-repeat="${page.alternateLanguageLinks.entrySet}"
      rel="alternate" hreflang="${item.key.toLanguageTag}" href="${item.value}">
<meta property="og:type" content="website"/>
<meta data-sly-test.description="${efe.modifiedDescription}" property="og:description" content="${efe.modifiedDescription}"/>
<meta property="og:title" content="${efe.modifiedTitle}"/>
<meta data-sly-test="${efe.canonicalLink}" property="og:url" content="${efe.canonicalLink}"/>
<meta data-sly-test.image="${efe.thumbnail}" property="og:image" content="${image}"/>
<meta name="twitter:card" content="summary_large_image" />
<meta property="twitter:image" content="${image}"/>
