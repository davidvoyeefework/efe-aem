<div data-sly-test ="${wcmmode.edit}" class="cq-placeholder cq-marker-start" data-emptytext="${component.title}"></div>
<sly data-sly-use.scheduler="com.efe.core.models.CDTScheduler"/>
<div data-sly-test ="${scheduler.SFLeadId}" id="${scheduler.SFLeadId}" class="cdtscheduler"></div>
<script data-sly-test ="${scheduler.SFLeadId}" src="https://cdn.financialengines.com/bundles/efe-self-scheduler/latest/efe-self-scheduler.umd.js"></script>
<script data-sly-test ="${scheduler.SFLeadId}">
  if (window.efeSelfScheduler?.inject) {
    window.efeSelfScheduler.inject({
      id: "${scheduler.SFLeadId}", // <-- same value as id in Step 1
      leadId: "${scheduler.SFLeadId}"
    });
  }
</script>
