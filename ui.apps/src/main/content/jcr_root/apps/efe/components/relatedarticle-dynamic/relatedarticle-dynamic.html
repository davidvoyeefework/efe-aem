<div class="relatedarticle-ed-center"
     data-sly-use.article="com.efe.core.models.RelatedArticleDynamic">

       <div style="background:yellow;color:black;padding:8px;font-size:14px;">
    RAD HTL LOADED | teasers=${article.relatedTeasers.size}
  </div>


  <!-- ===================== DEBUG (Option B: always render, HTL-safe) ===================== -->
  <div class="rad-debug"
       style="display:none"
       data-requesturi="${request.requestURI}"
       data-querystring="${request.queryString}"
       data-selectors="${request.requestPathInfo.selectors}"
       data-selectorstring="${request.requestPathInfo.selectorString}"
       data-teasercount="${article.relatedTeasers.size}">
  </div>

  <!-- ===================== LIST ===================== -->
  <ul data-sly-list.teaser="${article.relatedTeasers}"
      class="cmp-list">

    <li class="teaser cmp-teaser--thumbnail">
      <div class="cmp-teaser">

        <sly data-sly-set.linkUrl="${teaser.valueMap.linkURL}" />
        <sly data-sly-set.canonicalKey="${linkUrl @ extension=''}" />
        <sly data-sly-set.hero="${article.teaserHeroImages[canonicalKey]}" />

        <!-- Per-teaser debug (always present, HTL-safe) -->
        <div class="rad-debug"
             style="display:none"
             data-debug-scope="teaser"
             data-linkurl="${linkUrl}"
             data-canonicalkey="${canonicalKey}"
             data-herofrommap="${hero}">
        </div>

        <div class="cmp-teaser__content">

          <!-- Title -->
          <h2 class="title cmp-title--subhead-01">
            <a href="${linkUrl}">
              ${teaser.valueMap['jcr:title']}
            </a>
          </h2>

          <!-- Description -->
          <sly data-sly-test="${teaser.valueMap.text}">
            <p class="cmp-text--body-02">
              ${teaser.valueMap.text}
            </p>
          </sly>

          <!-- Asset Type button (single, prioritized, with fallback) -->
          <sly data-sly-set.hasArticle="${false}" />
          <sly data-sly-set.hasVideo="${false}" />
          <sly data-sly-set.hasPodcast="${false}" />

          <sly data-sly-test="${teaser.valueMap.assetTypeTagIds}">
            <sly data-sly-list.tid="${teaser.valueMap.assetTypeTagIds}">

              <sly data-sly-test="${tid == 'efe:asset-type/article'}">
                <sly data-sly-set.hasArticle="${true}" />
              </sly>

              <sly data-sly-test="${tid == 'efe:asset-type/video'}">
                <sly data-sly-set.hasVideo="${true}" />
              </sly>

              <sly data-sly-test="${tid == 'efe:asset-type/podcast'}">
                <sly data-sly-set.hasPodcast="${true}" />
              </sly>

            </sly>
          </sly>

          <sly data-sly-test="${hasArticle}">
            <div class="cmp-button--article"></div>
          </sly>

          <sly data-sly-test="${!hasArticle && hasVideo}">
            <div class="cmp-button--video"></div>
          </sly>

          <sly data-sly-test="${!hasArticle && !hasVideo && hasPodcast}">
            <div class="cmp-button--podcast"></div>
          </sly>

          <sly data-sly-test="${!hasArticle && !hasVideo && !hasPodcast}">
            <div class="cmp-button--article"></div>
          </sly>

        </div>

        <!-- Hero image exists -->
        <sly data-sly-test="${hero}">
          <div class="cmp-teaser__image">
            <img class="cmp-image__image"
                 src="${hero}"
                 alt="${teaser.valueMap['jcr:title']}"
                 loading="lazy" />
          </div>
        </sly>

        <!-- Fallback: no hero image -->
        <sly data-sly-test="${!hero}">
          <div class="cmp-teaser__image thumbnail-placeholder">
            <div class="cmp-image__image"></div>
          </div>
        </sly>

      </div>
    </li>

  </ul>

</div>
