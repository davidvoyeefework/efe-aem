  href="https://www.feitest.com/app/landing-utils/landing-page.92cf6829b542e7500238.css">

<sly data-sly-use.clientlib="core/wcm/components/commons/v1/templates/clientlib.html">
  <sly data-sly-call="${clientlib.js @ categories='efe.base', async=true}" />
</sly>

<script>
    var fe = {};
    function getCookie(name) {
      if (typeof document !== 'undefined') {
        var value = '; ' + document.cookie;
        var parts = value.split('; ' + name + '=');
        if (parts.length === 2) {
          return parts.pop().split(';').shift();
        }
      }
    };
    var env = {};
    var daVars = {};
    var daVarsStr = getCookie('daVars');
    if (daVarsStr) {
      try {
        daVars = JSON.parse(decodeURIComponent(daVarsStr));
      } catch (error) {
        throw new Error("Invalid daVars");
      }
    }
    daVars.appType = "static_page";
    daVars.namespace = "unbounce";
    env.da = daVars;
    fe.env = env;
    console.log(fe);
</script>
