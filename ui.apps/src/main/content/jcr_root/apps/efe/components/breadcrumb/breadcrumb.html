  <nav data-sly-use.breadcrumb="com.efe.core.models.EfeBreadCrumb"
  data-sly-use.template="core/wcm/components/commons/v1/templates.html"
  id="${breadcrumb.id}"
  class="cmp-breadcrumb"
  aria-label="${'Breadcrumb' @ i18n}"
  data-sly-test="${breadcrumb.items.size > 0}"
  data-cmp-data-layer="${breadcrumb.data.json}">
  <sly data-sly-test="${properties.showSelectorAsLeaf}" data-sly-use.leafitem="breadcrumb.js"></sly>
  <script data-sly-test="${breadcrumb.jsonLd}" type="application/ld+json">
    ${breadcrumb.jsonLd@context='unsafe'}
  </script>
 <ol class="cmp-breadcrumb__list"
     itemscope itemtype="http://schema.org/BreadcrumbList"
     data-sly-list.navItem="${breadcrumb.items}">
     <li class="cmp-breadcrumb__item${navItem.active && !properties.showSelectorAsLeaf && leafitem.selector == null ? ' cmp-breadcrumb__item--active' : ''}"
         aria-current="${navItem.active ? 'page' : false}"
         data-cmp-data-layer="${navItem.data.json}"
         itemprop="itemListElement" itemscope itemtype="http://schema.org/ListItem">
         <sly data-sly-test.lastItem="${breadcrumb.items.size == navItemList.count?'true':'false'}" /> 
         <a data-sly-attribute="${navItem.link.htmlAttributes}"
            class="cmp-breadcrumb__item-link"
            itemprop="item"
            data-cmp-clickable="${breadcrumb.data ? true : false}"
            data-sly-unwrap="${(navItem.active || !navItem.link.valid) && (!properties.showSelectorAsLeaf && leafitem.selector == null)}">
             <span itemprop="name">${navItem.title}</span>
         </a>
         <meta itemprop="position" content="${navItemList.count}" />
     </li>
     <li data-sly-test="${lastItem && properties.showSelectorAsLeaf && leafitem.selector}" class="cmp-breadcrumb__item cmp-breadcrumb__item--active"
        aria-current="page" itemprop="itemListElement" itemscope itemtype="http://schema.org/ListItem">
        <span itemprop="name">${leafitem.selector}</span>
        <meta data-sly-use.leafitem="${'breadcrumb.js' @ count=navItemList.count}" itemprop="position" content="${leafitem.count}" />
     </li>
 </ol>
</nav>
<sly data-sly-call="${template.placeholder @ isEmpty=breadcrumb.items.size == 0, classAppend='cmp-breadcrumb'}"></sly>
