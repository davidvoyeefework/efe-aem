        <div class="cmp-form-text cmp-form-text--efe-default cmp-form-text--default">
            <label for="form-text-991299145">Last Name</label>
            <input class="cmp-form-text__text" data-cmp-hook-form-text="input" type="text" id="lastName"
                placeholder="Last Name" name="lastName">
        </div>
        <div class="cmp-form-text cmp-form-text--efe-default cmp-form-text--default">
            <label for="form-text-991299145">Zip Code</label>
            <input class="cmp-form-text__text" data-cmp-hook-form-text="input" type="text" id="zipCode"
                placeholder="Zip Code" name="zipCode">
        </div>
        <div class="cmp-form-text cmp-form-text--efe-default cmp-form-text--default">
            <label for="form-text-991299145">Date of birth</label>

                placeholder="Date of birth" name="dateOfBirth">

<style>
    .unbounce-form .cmp-form-text {
        margin-bottom: 10px;
    }
</style>

<script type="text/javascript">

document.getElementById("unbounce-sign-up-form").addEventListener("submit", function(event) {
  event.preventDefault(); // Prevent default form submission

  // Call custom function to handle form submission
  handleFormSubmit();
});

function handleFormSubmit() {
  // Retrieve form data
  var firstName = document.getElementById("firstName").value;
  var lastName = document.getElementById("lastName").value;
  var zipCode = document.getElementById("zipCode").value;
  var ssn = document.getElementById("ssn").value;
  var planOwnerId = document.getElementById("planOwnerId").value;

  // Construct JSON object
  var data = {
    firstName: firstName,
    lastName: lastName,
    zipCode: zipCode,
    ssn: ssn,
    planOwnerId: planOwnerId
  };

  // Send data as JSON using fetch()
  fetch("https://www.feitest.com/api/v1/userlogin/confirmIdentity?loginContext=CONFIRM_IDENTITY", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  })
    .then(response => response.json())
    .then(result => {
      // Handle response from the server
      console.log(result);
    })
    .catch(error => {
      // Handle error
      console.error(error);
    });
}
</script>
