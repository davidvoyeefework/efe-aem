<sly data-sly-use.template="core/wcm/components/commons/v1/templates.html"
     data-sly-test.isNotEmpty="${!tagsImpl.empty}">
    <div class="cmp-tags" id="${tagsImpl.id}">
        <sly data-sly-list.tagsList="${tagsImpl.tagList}">
            <div class="button cmp-button--title-tag cmp-button-- cmp-button-- cmp-button--">
                <a href="" type="button" id="button-5487aab983" class="cmp-button" data-cmp-clickable="">
                    <span class="cmp-button__text">${tagsList.tagLabel}</span>
                </a>
            </div>
        </sly>
    </div>
</sly>
<sly data-sly-call="${template.placeholder @ isEmpty=!isNotEmpty, classAppend='cmp-tags'}"></sly>
