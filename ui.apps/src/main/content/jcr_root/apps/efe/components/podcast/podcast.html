<section class="podcast" data-sly-use.model="com.efe.core.models.PodcastModel"
    data-sly-use.template="core/wcm/components/commons/v1/templates.html" data-attr="${!model.empty}"
    data-sly-test.isNotEmpty="${!model.empty}" data-sly-set.podcast="${model.podcast}">

    <h4 class="cmp-podcast-archive__title" > ${podcast.title}</h4>

    <p class="cmp-podcast-archive__episode"><span>Season 2</span> <span>Episode 2</span></p>
    <iframe id="latest-episode-iframe" class="episode-page-iframe"
        src="${podcast.embedUrl}?style=artwork&image=1&share=1&download=1&foreground=ffffff&background=2A2C33&highlight=66cbe2"
        width="100%" height="180" frameborder="0" title=""></iframe>

    <br>
    <div class="cmp-podcast-archive__description"> ${podcast.descriptionHtml @context = 'html'}
    </div>
</section>
<sly data-sly-call="${template.placeholder @ isEmpty=!isNotEmpty, classAppend='cmp-podcastlist'}"></sly>
