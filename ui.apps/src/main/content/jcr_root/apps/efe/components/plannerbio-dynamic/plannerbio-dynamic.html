<section 
    data-sly-use.model="com.efe.core.models.PlannerBio"
    data-sly-use.template="core/wcm/components/commons/v1/templates.html"
    data-sly-set.planner="${model.plannerResponse}"
    data-sly-test.isNotEmpty="${planner.firstName}"
    aria-label="planner-bio" class="cmp-efe-plannerbio">

    <div id ="planner-bio-referral" class="">
        <h2 class="">Get to know ${planner.firstName}</sly></h2>        
        <div class="flex">

            <div class="get-to-know-section">

                <div class="img-container">
                    <img src="${planner.desktopImageUrl}" alt="${planner.firstName} ${planner.lastName}" class="">
                </div>

                <div class="content-container">

                    <h3 id="planner-name">${planner.firstName}
                        <sly data-sly-test="${planner.lastName}">${planner.lastName}</sly>
                    </h3>

                    <p id="body-copy" data-sly-test="${planner.bio}">${planner.bio}</p>   

                    <div data-sly-test="${!planner.education.empty}" class="block">
                        <h4 class="">Education</h3>
                        <p data-sly-repeat="${planner.education}" class="education-item">${item.degree}<span data-sly-test="${!item.major.empty}">, </span>${item.major} - <span class="university">${item.university}</span></p>                      
                    </div>                

                    <div data-sly-test="${!planner.certifications.empty}" class="block">
                        <h4 class="">Certifications</h3>
                        <p data-sly-repeat="${planner.certifications}">${item.name}</p>
                    </div>

                    <div data-sly-test="${!(model.officeLocations.size == 1 && model.officeLocations[0].city == 'Phoenix')}" class="block">
                        <h4 class="">Locations</h3>
                        <p>                    
                            <span class="heading-location-details" data-sly-test="${model.officeLocations}">
                                <span data-sly-list.item="${model.officeLocations}">
                                    <span class="location-item">
                                        <span data-sly-test="${item.city != 'Phoenix'}">
                                            <span data-sly-test="${item.city}">${item.externalName},</span>
                                            <span data-sly-test="${item.state}">${item.state}</span>
                                        <span>
                                    </span>
                                </span>
                            </span>
                        </p>
                    </div>    

                </div>
            </div>

            <div data-sly-test="${planner.bioVideo}" class="video-container">
                <video id="planner-video" controls width="320" height="240" controls>
                    <source src="${planner.bioVideo}" type="video/mp4">
                    Your browser does not support the video tag. Here is a  <a target="_blank" href="${planner.bioVideo}">link to the video</a> instead.
                </video>
                <button aria-label="Play Planner Biography Video" id="playButton" class="play-button"><span class="visually-hidden">Play</span></button>
            </div>            


        </div>
    </div>  

    <script>    

    // Planner method values
    const firstName = '${planner.firstName @context="scriptString"}';
    const lastName = '${planner.lastName @context="scriptString"}';
    const firstNameAlias = '${planner.firstNameAlias @context="scriptString"}';
    const plannerId = '${planner.id @context="scriptString"}';
    const bio = '${planner.bio @context="scriptString"}';
    const title = '${planner.title @context="scriptString"}';

    // String Tokens Text to replace
    const plannerNameToken = '{planner.firstName}';
    const plannerIdToken = '{planner.id}';
    const plannerlastNameToken = '{planner.lastName}';
    const plannerFirstNameAliasToken = '{planner.firstNameAlias}';
    const plannerBioToken = '{planner.bio}';
    const plannerTitleToken = '{planner.title}';

    // Token Class Names
    const plannerNameClass = 'plannerName';
    const plannerIdClass = 'plannerId';
    const plannerLastNameClass = 'plannerLastName';
    const plannerFirstNameAliasClass = 'plannerFirstNameAlias';
    const plannerBioClass = 'plannerBio';
    const plannerTitleClass = 'plannerTitle';

        const findElementsByTextContent = (token, className) => {
            const allElements = document.querySelectorAll('p, h1, h2, h3, h4, h5, h6, input[type="hidden"]');
            const matchingElements = [];

            allElements.forEach(element => {
                if (element.textContent.toLowerCase().includes(token.toLowerCase())) {
                    element.classList.add(className);
                    matchingElements.push(element);
                }
                if (element.value == token) {
                    element.classList.add(className);
                    matchingElements.push(element);

                }
            });

            return matchingElements;
        }

        const replaceElementText = (className, newText, token) => {
              const elements = document.querySelectorAll("."+className);
              elements.forEach( element =>  {
                if (element.tagName === 'INPUT') {
                    let currentText = element.value;
                    let updatedText = currentText.replace(token, newText);
                    if (element) {
                        element.value = updatedText;
                    }
                }
                else {
                    let currentText = element.innerText;
                    let updatedText = currentText.replace(token, newText);
                    if (element) {
                        element.textContent = updatedText;
                    }                     
                }
             });
        }

        document.addEventListener("DOMContentLoaded", function () {
            const plannerNameTokens = findElementsByTextContent(plannerNameToken, plannerNameClass);
            const plannerIdTokens = findElementsByTextContent(plannerIdToken, plannerIdClass);
            const plannerLastNameTokens = findElementsByTextContent(plannerlastNameToken, plannerLastNameClass);
            const plannerFirstNameAliasTokens = findElementsByTextContent(plannerFirstNameAliasToken, plannerFirstNameAliasClass); 
            const plannerBioTokens = findElementsByTextContent(plannerBioToken, plannerBioClass);
            const plannerTitleTokens = findElementsByTextContent(plannerTitleToken, plannerTitleClass);


            plannerNameTokens.forEach( function(item){
                replaceElementText( plannerNameClass, firstName, plannerNameToken);
            });

            plannerIdTokens.forEach( function(item){
                replaceElementText(plannerIdClass, plannerId, plannerIdToken);
            });

            plannerLastNameTokens.forEach( function(item){
                replaceElementText(plannerLastNameClass, lastName, plannerlastNameToken);
            });

            plannerFirstNameAliasTokens.forEach( function(item){
                replaceElementText(plannerFirstNameAliasClass, firstNameAlias, plannerFirstNameAliasToken);
            });   
            
            plannerBioTokens.forEach( function(item){
                replaceElementText(plannerBioClass, bio, plannerBioToken);
            });

            plannerTitleTokens.forEach( function(item){
                replaceElementText(plannerTitleClass, title, plannerTitleToken);
            });            

        });

        const updateFormTokens = () => {
            const plannerIdTokens = findElementsByTextContent(plannerIdToken, plannerIdClass);
            plannerIdTokens.forEach( function(item){
                replaceElementText(plannerIdClass, plannerId, plannerIdToken);
            });            
        }

        document.addEventListener('pmapiFormLoaded', function (e) {
            updateFormTokens();
        });

    </script>

    <script data-sly-test="${model.jsonLd}" type="application/ld+json">
        ${model.jsonLd @context ='unsafe'}
    </script>
</section>
<sly data-sly-call="${template.placeholder @ isEmpty=!isNotEmpty, classAppend='cmp-plannerbio'}"></sly>



<script>
    const video = document.getElementById("planner-video");
    const playButton = document.getElementById("playButton");

    if (video != null) {
        playButton.addEventListener("click", function() {
            if (video.paused) {
                video.play();
                playButton.style.display = "none";
            } else {
                video.pause();
            }
        });
    }


</script>
