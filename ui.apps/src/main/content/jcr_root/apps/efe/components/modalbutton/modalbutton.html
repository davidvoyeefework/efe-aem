<div data-sly-test ="${wcmmode.edit}" class="cq-placeholder cq-marker-start" data-emptytext="${component.title}"></div>
<sly data-sly-use.model="com.efe.core.models.ModalButton"/>

<div class='button cmp-button--button-primary cmp-button--center cmp-button--default cmp-button--default'>
    <button class='cmp-button' onclick="showButtonModal(event);" data-modal-id = "${model.id}">
        <span class='cmp-button__text'>${model.buttonText}</span>
    </button>
 </div>
<div class="dialog-container cmp-modal--button d-none" id="${model.id}" aria-hidden="true" data-component="modal-button">
    <div class="dialog-overlay" data-ally-dialog-hide></div><!-- comment -->
    <div class="cmp-modal" role="document"><!-- comment -->
        <div class="cmp-modal__container responsivegrid"><!-- comment -->
            <button data-a11y-dialog-hide class="cmp-modal__close" aria-label="Close this dialog window" onclick="hideButtonModal(event);">
                <svg width="19" height="19" viewBox="0 0 19 19" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <line y1="-1" x2="23.9943" y2="-1" transform="matrix(0.705714 0.708497 -0.705714 0.708497 0 2)" stroke="#7A7D82"
                          stroke-width="2" />
                    <line y1="-1" x2="23.9943" y2="-1" transform="matrix(0.705714 -0.708497 0.705714 0.708497 2.06641 19)"
                          stroke="#7A7D82" stroke-width="2" />
                </svg>
            </button>
            <sly data-sly-resource="${model.embedFragment @ resourceType='wcm/core/components/experiencefragment'}"></sly>
        </div>
    </div>
</div>
