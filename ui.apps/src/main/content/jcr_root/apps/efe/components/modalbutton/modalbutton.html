<sly data-sly-use.modal="com.efe.core.models.ModalButton"/>
<sly data-sly-use.clientLib="core/wcm/components/commons/v1/templates/clientlib.html">
<sly data-sly-call="${clientLib.js @ categories='efe.modalbutton'}" />  

<div class='button cmp-button--button-primary cmp-button--center cmp-button--default cmp-button--default'>
    <button class='cmp-button cmp-modal--button' data-modal-id = "${modal.id}" value="${modal.buttonText}">
        <span class='cmp-button__text'>${modal.buttonText}</span>
    </button>
</div>
<div class="cmp-button--modal d-none" id="${modal.id}" data-template-id="${modal.id}-template" data-scheduler-container-id="${ecschedule.containerID}">
    <div class="dialog-overlay"></div><!-- comment -->
    <div class="cmp-button-modal-content" role="document"><!-- comment -->
        <template id="${modal.id}-template">
        <div class="cmp-button-modal-content__container responsivegrid"><!-- comment -->
            <button class="cmp-button-modal-content__close" aria-label="Close this dialog window" data-modal-id = "${modal.id}">
                <svg width="19" height="19" viewBox="0 0 19 19" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <line y1="-1" x2="23.9943" y2="-1" transform="matrix(0.705714 0.708497 -0.705714 0.708497 0 2)" stroke="#7A7D82"
                          stroke-width="2" />
                    <line y1="-1" x2="23.9943" y2="-1" transform="matrix(0.705714 -0.708497 0.705714 0.708497 2.06641 19)"
                          stroke="#7A7D82" stroke-width="2" />
                </svg>
            </button>
        </div>
        <div class="cmp-button-modal-content__xfcontent">
            <!-- Server-side XF on publish (optional) -->
            <sly data-sly-test="${wcmmode.disabled}"
                data-sly-resource="${modal.embedFragment @ selectors='content', wcmmode='disabled'}"></sly>
                <div id="${ecschedule.containerID}"></div>
        </div>
        </template>
    </div>
</div>

<script>
(function () {
  function closestMatch(el, selector) {
    return el && (el.closest ? el.closest(selector) : null);
  }

  function mountModal(modal) {
    const templateId = modal.dataset.templateId || (modal.id + '-template');
    const tmpl = document.getElementById(templateId);
    const contentRoot = modal.querySelector('.cmp-button-modal-content');

    contentRoot.innerHTML = '';
    if (tmpl) {
      const clone = tmpl.content.cloneNode(true);
      contentRoot.appendChild(clone);
    }

    modal.classList.remove('d-none');
    modal.querySelector('.cmp-button-modal-content__close')?.focus();

    // Now safely read the container id from the wrapper
    const containerId = modal.dataset.schedulerContainerId;
    // Defensive fallback: try to find the element inside by id if dataset is missing
    const containerEl = containerId ? document.getElementById(containerId)
                                    : contentRoot.querySelector('[id]');
    if (!containerId) {
      console.warn('data-scheduler-container-id missing on modal wrapper:', modal.id);
    }
    if (!containerEl) {
      console.error('Scheduler container element not found. Check template <div id="...">.');
      return;
    }

    // Feature-detect the third-party API before calling
    const api = window.efeSelfSchedulerEc;
    if (!api || typeof api.inject !== 'function') {
      console.warn('efeSelfSchedulerEc.inject() not available yet.');
      // Optional: show a friendly message rather than blank content
      if (!containerEl.innerHTML) {
        containerEl.innerHTML = '<p class="scheduler-unavailable">Scheduler unavailable. Please try again.</p>';
      }
      return;
    }

    try {
      const result = api.inject({ id: containerEl.id });
      if (result && typeof result.then === 'function') {
        result.catch(err => console.error('Scheduler inject failed:', err));
      }
    } catch (err) {
      console.error('Scheduler inject threw:', err);
    }
  }

  function cleanupModal(modal) {
    // Try to destroy/unmount widget if API exists; else clear container
    const containerId = modal.dataset.schedulerContainerId;
    const api = window.efeSelfSchedulerEc;
    if (containerId) {
      try {
        if (api?.destroy) api.destroy(containerId);
        else if (api?.unmount) api.unmount(containerId);
        else {
          const el = document.getElementById(containerId);
          if (el) el.innerHTML = '';
        }
      } catch (e) {
        console.warn('Scheduler cleanup error:', e);
      }
    }

    // Clear modal content
    const contentRoot = modal.querySelector('.cmp-button-modal-content');
    if (contentRoot) contentRoot.innerHTML = '';
  }

  // Delegated open
  document.addEventListener('click', function (e) {
    const openBtn = closestMatch(e.target, 'button.cmp-modal--button');
    if (!openBtn) return;

    const modalId = openBtn.dataset.modalId;
    const modal = document.getElementById(modalId);
    if (!modal) return;

    mountModal(modal);
  });

  // Delegated close: close button and overlay
  document.addEventListener('click', function (e) {
    const closeBtn = closestMatch(e.target, 'button.cmp-button-modal-content__close');
    if (closeBtn) {
      const modal = document.getElementById(closeBtn.dataset.modalId) || closestMatch(closeBtn, '.cmp-button--modal');
      if (modal) {
        cleanupModal(modal);
        modal.classList.add('d-none');
      }
      return;
    }

    const overlay = closestMatch(e.target, '.cmp-button--modal .dialog-overlay');
    if (overlay) {
      const modal = closestMatch(overlay, '.cmp-button--modal');
      if (modal) {
        cleanupModal(modal);
        modal.classList.add('d-none');
      }
    }
  });

  // Esc to close all
  document.addEventListener('keydown', function (e) {
    if (e.key !== 'Escape') return;
    document.querySelectorAll('.cmp-button--modal').forEach(modal => {
      cleanupModal(modal);
      modal.classList.add('d-none');
    });
  });
})();
</script>
