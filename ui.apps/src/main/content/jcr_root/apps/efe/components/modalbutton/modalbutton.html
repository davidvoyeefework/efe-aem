<sly data-sly-use.modal="com.efe.core.models.ModalButton"/>
<sly data-sly-call="${clientLib.js @ categories='efe.modalbutton'}" />  

<div class='button cmp-button--button-primary cmp-button--center cmp-button--default cmp-button--default'>
    <button class='cmp-button cmp-modal--button' data-modal-id = "${modal.id}" value="${modal.buttonText}">
        <span class='cmp-button__text'>${modal.buttonText}</span>
    </button>
</div>
<div class="cmp-button--modal d-none" id="${modal.id}">
    <div class="dialog-overlay"></div><!-- comment -->
    <div class="cmp-button-modal-content" role="document"><!-- comment -->
        <div class="cmp-button-modal-content__container responsivegrid"><!-- comment -->
            <button class="cmp-button-modal-content__close" aria-label="Close this dialog window" data-modal-id = "${modal.id}">
                <svg width="19" height="19" viewBox="0 0 19 19" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <line y1="-1" x2="23.9943" y2="-1" transform="matrix(0.705714 0.708497 -0.705714 0.708497 0 2)" stroke="#7A7D82"
                          stroke-width="2" />
                    <line y1="-1" x2="23.9943" y2="-1" transform="matrix(0.705714 -0.708497 0.705714 0.708497 2.06641 19)"
                          stroke="#7A7D82" stroke-width="2" />
                </svg>
            </button>
        </div>
        <div class="cmp-button-modal-content__xfcontent" data-sly-resource="${@path=modal.embedFragment, selectors='content', wcmmode='disabled',resourceType='cq/experience-fragments/components/xfpage'}">
        </div>
    </div>
</div>
