<sly data-sly-use.modal="com.efe.core.models.ModalButton"/>
<sly data-sly-use.clientLib="core/wcm/components/commons/v1/templates/clientlib.html">
<sly data-sly-call="${clientLib.js @ categories='efe.modalbutton'}" />  

<div class='button cmp-button--button-primary cmp-button--center cmp-button--default cmp-button--default'>
    <button class='cmp-button cmp-modal--button' data-modal-id = "${modal.id}" value="${modal.buttonText}">
        <span class='cmp-button__text'>${modal.buttonText}</span>
    </button>
</div>
<div class="cmp-button--modal d-none" id="${modal.id}" >
    <div class="dialog-overlay"></div><!-- comment -->
    <div class="cmp-button-modal-content" role="document"><!-- comment -->
        <div class="cmp-button-modal-content__container responsivegrid"><!-- comment -->
            <button class="cmp-button-modal-content__close" aria-label="Close this dialog window" data-modal-id = "${modal.id}">
                <svg width="19" height="19" viewBox="0 0 19 19" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <line y1="-1" x2="23.9943" y2="-1" transform="matrix(0.705714 0.708497 -0.705714 0.708497 0 2)" stroke="#7A7D82"
                          stroke-width="2" />
                    <line y1="-1" x2="23.9943" y2="-1" transform="matrix(0.705714 -0.708497 0.705714 0.708497 2.06641 19)"
                          stroke="#7A7D82" stroke-width="2" />
                </svg>
            </button>
        </div>
        <sly data-sly-test='${wcmmode.disabled}'>
            <div class="cmp-button-modal-content__xfcontent"
                 data-sly-resource="${modal.embedFragment @ 
                 selectors='content', 
                 wcmmode='disabled'}">
            </div>
        </sly>
    </div>
</div>
<script type="text/javascript">
(() => {
  'use strict';

  // Utilities
  const $$ = (sel, ctx = document) => Array.from(ctx.querySelectorAll(sel));
  const byId = (id) => document.getElementById(id);

  const lockScroll = () => document.documentElement.classList.add('modal-open');
  const unlockScroll = () => document.documentElement.classList.remove('modal-open');

  const focusFirstFocusable = (container) => {
    if (!container) return;
    const focusables = container.querySelectorAll(
      'a[href], button:not([disabled]), textarea, input, select, [tabindex]:not([tabindex="-1"])'
    );
    if (focusables.length) focusables[0].focus();
  };

  // Open modal using the WRAPPER (.cmp-button--modal) which has the same id as data-modal-id
  const openModal = (modalId) => {
    if (!modalId) return;
    const wrapper = byId(modalId);
    if (!wrapper) {
      console.warn(`[modal] Missing wrapper with id=modalId (.cmp-button--modal)`);
      return;
    }

    // Expect wrapper to have .cmp-button--modal (per your HTL)
    if (!wrapper.classList.contains('cmp-button--modal')) {
      console.warn(`[modal] Element modalId does not have class "cmp-button--modal"`);
    }

    wrapper.classList.remove('d-none');
    wrapper.classList.add('is-open');
    wrapper.setAttribute('aria-hidden', 'false');
    lockScroll();

    // OPTIONAL: if you later add a scheduler target via data-scheduler-container-id on wrapper
    const containerId = wrapper.dataset.schedulerContainerId;
    if (containerId && window.efeSelfSchedulerEc && typeof window.efeSelfSchedulerEc.inject === 'function') {
      const target = byId(containerId);
      if (target) target.innerHTML = '';
      try {
        window.efeSelfSchedulerEc.inject({ id: containerId });
      } catch (e) {
        console.error('[modal] Scheduler inject failed:', e);
      }
    }

    // Focus management — focus inside the inner modal content if present
    const inner = wrapper.querySelector('.cmp-button-modal-content') || wrapper;
    focusFirstFocusable(inner);
  };

  const closeModal = (modalId) => {
    if (!modalId) return;
    const wrapper = byId(modalId);
    if (!wrapper) return;

    wrapper.classList.add('d-none');
    wrapper.classList.remove('is-open');
    wrapper.setAttribute('aria-hidden', 'true');

    // OPTIONAL: clean up scheduler target (if added)
    const containerId = wrapper.dataset.schedulerContainerId;
    if (containerId) {
      const target = byId(containerId);
      if (target) target.innerHTML = '';
    }

    const anyOpen = document.querySelector('.cmp-button--modal.is-open');
    if (!anyOpen) unlockScroll();
  };

  const registerHandlers = () => {
    // Openers
    $$('.cmp-modal--button').forEach((btn) => {
      if (btn.dataset.modalBound === '1') return;
      btn.dataset.modalBound = '1';
      btn.setAttribute('type', btn.getAttribute('type') || 'button'); // prevent form submit
      btn.addEventListener('click', (e) => {
        const id = e.currentTarget.dataset.modalId;
        if (!id) return console.warn('[modal] Missing data-modal-id on opener');
        openModal(id);
      });
    });

    // Closer buttons
    $$('.cmp-button-modal-content__close').forEach((btn) => {
      if (btn.dataset.modalBound === '1') return;
      btn.dataset.modalBound = '1';
      btn.setAttribute('type', btn.getAttribute('type') || 'button');
      btn.addEventListener('click', (e) => {
        const id = e.currentTarget.dataset.modalId
          || e.currentTarget.closest('.cmp-button--modal')?.id
          || e.currentTarget.closest('.cmp-button-modal-content')?.id;
        if (!id) return console.warn('[modal] Unable to infer modal id on close');
        closeModal(id);
      });
    });

    // Backdrop/overlay click
    $$('.cmp-button--modal .dialog-overlay').forEach((overlay) => {
      if (overlay.dataset.modalBound === '1') return;
      overlay.dataset.modalBound = '1';
      overlay.addEventListener('click', (e) => {
        const wrapper = e.currentTarget.closest('.cmp-button--modal');
        if (wrapper?.id) closeModal(wrapper.id);
      });
    });

    // (Optional) click outside inner content closes modal if you prefer:
    $$('.cmp-button--modal').forEach((wrapper) => {
      if (wrapper.dataset.modalWrapperBound === '1') return;
      wrapper.dataset.modalWrapperBound = '1';
      wrapper.addEventListener('click', (e) => {
        const inner = wrapper.querySelector('.cmp-button-modal-content');
        // If you only want overlay to close, comment this out:
        if (e.target === wrapper && wrapper.id) closeModal(wrapper.id);
        // Otherwise, keeping overlay-specific handler above is cleaner.
      });
    });

    // ESC close
    if (!document.body.dataset.modalKeyBound) {
      document.body.dataset.modalKeyBound = '1';
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          const open = document.querySelector('.cmp-button--modal.is-open');
          if (open?.id) closeModal(open.id);
        }
      });
    }
  };

  // Minimal API (handy for tests or programmatic control)
  window.cmpModal = {
    open: openModal,
    close: closeModal,
    refresh(id) { closeModal(id); openModal(id); }
  };

  // Initial bind + observe future DOM changes (AEM async inserts)
  registerHandlers();
  const observer = new MutationObserver(registerHandlers);
  observer.observe(document.documentElement, { childList: true, subtree: true });
})();
</script>
