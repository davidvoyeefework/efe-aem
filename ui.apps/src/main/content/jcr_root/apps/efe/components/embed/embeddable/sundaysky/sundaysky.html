<sly data-sly-use.sundaysky="com.efe.core.models.SundayskyModel"
     data-sly-use.templates="core/wcm/components/commons/v1/templates.html">
        <div id="sundaysky-video-container">
            
                <p>Program ID: ${sundaysky.programId}</p>
                <p>Base URL: ${sundaysky.baseUrl}</p>
                <p>Video URL: ${sundaysky.videoUrl}</p>
                <p>Width: ${sundaysky.width}</p>
                <p>Height: ${sundaysky.height}</p>

            <iframe id="${sundaysky.programId @ context='scriptString'}" width="${sundaysky.width @ context='scriptString'}" height="${sundaysky.height @ context='scriptString'}" style="border:none; min-height:405px" allowfullscreen></iframe>
            <script>
                    document.addEventListener("DOMContentLoaded", function () {
    const iframe = document.getElementById("${sundaysky.programId @ context='scriptString'}");
    if (iframe) {
        iframe.src = "${sundaysky.baseUrl @ context='scriptString'}/?programId=${sundaysky.programId @ context='scriptString'}" + 
                     (window.location.search ? '&' + window.location.search.substring(1) : '');
    }
});

            </script>
        </div>
     
</sly>
<sly data-sly-call="${templates.placeholder @ isEmpty=!hasContent, classAppend='cmp-embed__sundaysky'}"></sly>
