<sly data-sly-use.sundaysky="com.efe.core.models.SundayskyModel"
     data-sly-use.templates="core/wcm/components/commons/v1/templates.html">
        <div id="sundaysky-video-container">
            <div class="cmp-embed__sundaysky">
            <iframe class="cmp-embed__sundaysky-iframe"
            id="${sundaysky.programId @ context = 'attribute'}" 
            style="border:none; height:${sundaysky.minHeight || 'auto' @ context = 'styleToken'}"
            title="${sundaysky.title}" 
            allowfullscreen></iframe>
            <script>
                document.getElementById("${sundaysky.programId @ context='attribute'}").src =
                        "${sundaysky.videoUrl @ context='uri'}" + 
                        (window.location.search ? '&' + window.location.search.substring(1) : '');
            </script>
            </div>
        </div>
     
</sly>
<sly data-sly-call="${templates.placeholder @ isEmpty=!hasContent, classAppend='cmp-embed__sundaysky'}"></sly>
