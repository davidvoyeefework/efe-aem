<sly data-sly-use.sundaysky="com.efe.core.models.SundayskyModel"
     data-sly-use.templates="core/wcm/components/commons/v1/templates.html"
     data-sly-test.hasContent="${sundaysky.baseUrl @ context='unsafe'}">
        <div id="sundaysky-video-container">
        <script>
            (function() {
                const baseUrl = "${sundaysky.baseUrl @ context='unsafe'}";
                const programId = "${sundaysky.programId @ context='unsafe'}";
                const title = "${sundaysky.title @ context='unsafe'}";
                const width = "${sundaysky.width @ context='unsafe'}";
                const height = "${sundaysky.height @ context='unsafe'}";
                const scrolling = "${sundaysky.scrolling @ context='unsafe'}";
                

                const queryString = window.location.search;
                const urlParams = new URLSearchParams(queryString);
                const personaKey = urlParams.get('id');

                if (personakey) {
                    const iframe = document.createElement('iframe');
                    iframe.src = "${sundaysky.baseUrl @ context='unsafe'}/?programId=${sundaysky.programId @ context='unsafe'}&id=${personakey @ context='unsafe'}";
                    title="${sundaysky.title @ context='unsafe'}";
                    iframe.width = "${sundaysky.width  || 'auto' @ context='scriptString'}";
                    iframe.height = "${sundaysky.height || 'auto' @ context='scriptString'}";
                    iframe.frameBorder = "0";
                    iframe.allowFullscreen = true;
                    scrolling="${sundaysky.scrolling @ context='unsafe' == 'yes' ? iframe.scrolling : 'none'}";
                    document.getElementById('sundaysky-video-container').appendChild(iframe);
                } else {
                    document.getElementById('sundaysky-video-container').innerText = "Personalized video unavailable.";
                }
            })();
        </script>
    </div>
     
</sly>
<sly data-sly-call="${templates.placeholder @ isEmpty=!hasContent, classAppend='cmp-embed__sundaysky'}"></sly>
